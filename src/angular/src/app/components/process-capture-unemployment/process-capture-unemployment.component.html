<form [formGroup]="unemployment.form" (ngSubmit)="unemployment.submit()" class="card">
  <div class="card-header">
    <h4 class="card-header-title">
      Situação de desemprego
    </h4>
    <div class="form-check form-switch">
      <input [formControlName]="'enabled'" class="form-check-input" type="checkbox" id="legalRepresentativeEnabled" />
      <label class="form-check-label d-none" for="legalRepresentativeEnabled">Situação de desemprego</label>
    </div>
  </div>
  <div  class="card-body">
    <div class="row">
      <div class="col-12 col-lg-6">
        <app-form-group
          #hasStatement
          [name]="'hasStatement'"
          [label]="'Entregou declaração'"
          class="form-group d-block mb-4">
          <!-- Input -->
          <select
            [class.is-invalid]="hasStatement?.invalid"
            [formControl]="hasStatement.control"
            [id]="hasStatement.name"
            class="form-select"
            tabindex="1">
            <option></option>
            <option [value]="false">Não</option>
            <option [value]="true">Sim</option>
          </select>
        </app-form-group>
      </div>
      <div class="col-12 col-lg-6">
        <app-form-group
          #hasElegibleStatement
          [name]="'hasElegibleStatement'"
          [label]="'Declaração válida'"
          class="form-group d-block mb-4">
          <!-- Input -->
          <select
            [class.is-invalid]="hasElegibleStatement?.invalid"
            [formControl]="hasElegibleStatement.control"
            [id]="hasElegibleStatement.name"
            class="form-select"
            tabindex="1">
            <option [ngValue]="null" disabled></option>
            <option [ngValue]="false">Não</option>
            <option [ngValue]="true">Sim</option>
          </select>
        </app-form-group>
      </div>
    </div>
  </div>
</form>
